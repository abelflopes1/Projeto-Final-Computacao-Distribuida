version: "3.9"

services:

  auth-service:
    build:
      context: ./auth_service

    container_name: auth-service

    ports:
      - "5001:5001"

    networks:
      - microservices-net

    restart: on-failure

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  profile-service:
    build:
      context: ./profile_service

    container_name: profile-service

    ports:
      - "5002:5002"

    environment:
      AUTH_SERVICE_URL: "http://auth-service:5001"

    depends_on:
      auth-service:
        condition: service_healthy

    networks:
      - microservices-net

    restart: on-failure

networks:
  microservices-net:
    driver: bridge